<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語テストメーカー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">

    <section id="start-screen" class="card">
      <div class="badge">Vocabulary Quiz</div>
      <h1>単語テストメーカー</h1>
      <p class="lead">
        CSV単語帳を読み込んで、4択テストを作れます。
      </p>

      <div class="setting-grid">
        <div class="setting-box">
          <label for="book-select">単語帳</label>
          <select id="book-select">
  <option value="data/sample.csv">サンプル単語帳</option>
  <option value="data/target1900_section.csv">ターゲット1900</option>
</select>
        </div>

        <div class="setting-box">
          <label for="lesson-select">範囲</label>
          <select id="lesson-select">
            <option value="all">全範囲</option>
          </select>
        </div>

        <div class="setting-box">
          <label for="mode-select">テスト形式</label>
          <select id="mode-select">
            <option value="en-ja">英語 → 日本語</option>
            <option value="ja-en">日本語 → 英語</option>
          </select>
        </div>

        <div class="setting-box">
          <label for="count-select">問題数</label>
          <select id="count-select">
            <option value="10">10問</option>
            <option value="20">20問</option>
            <option value="all">全問</option>
          </select>
        </div>
      </div>

      <div id="book-info" class="info-box">
        単語帳を読み込み中...
      </div>

      <button id="start-btn" class="main-btn">テストを始める</button>
    </section>

    <section id="quiz-screen" class="card hidden">
      <div class="top-row">
        <p id="progress"></p>
        <p id="mode-label"></p>
      </div>

      <div class="bar">
        <div id="bar-fill"></div>
      </div>

      <p id="question-label"></p>
      <h2 id="word"></h2>

      <div id="choices"></div>

      <p id="feedback"></p>

      <button id="next-btn" class="main-btn hidden">次へ</button>
    </section>

    <section id="result-screen" class="card hidden">
      <div class="badge">Result</div>
      <h2>結果</h2>

      <div class="result-box">
        <p id="score"></p>
        <p id="rate"></p>
      </div>

      <div id="wrong-list"></div>

      <button id="retry-wrong-btn" class="main-btn hidden">間違えた単語だけ再テスト</button>
      <button id="restart-btn" class="main-btn">同じ条件でもう一度</button>
      <button id="back-btn" class="sub-btn">最初の画面に戻る</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
